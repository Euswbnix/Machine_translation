# Transformer Base Configuration
# Following "Attention Is All You Need" (Vaswani et al., 2017)

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000        # shared BPE vocab
  share_embeddings: true   # share src/tgt/output embeddings

training:
  batch_size: 24576        # tokens per batch (fits ~25GB on 5090)
  max_sentences: 192
  accumulate_steps: 4      # effective batch = ~100K tokens
  max_steps: 800000        # ~200K optimizer updates, ~8 epochs on 25M pairs
  warmup_steps: 4000
  lr: 0.0007               # peak learning rate
  lr_scale: 1.0            # paper default — clean run, no experiments
  min_lr: 0.0              # pure Noam decay, no floor
  label_smoothing: 0.1
  clip_grad_norm: 1.0
  fp16: true
  seed: 42
  save_interval: 5000
  # Adaptive eval interval: starts at eval_interval (max), shrinks to
  # eval_interval_min as loss drops from eval_loss_high to eval_loss_low.
  eval_interval: 20000       # max interval (used when loss >= eval_loss_high)
  eval_interval_min: 2000    # min interval (used when loss <= eval_loss_low)
  eval_loss_high: 4.0        # loss above this → max interval
  eval_loss_low: 3.0         # loss below this → min interval
  log_interval: 100
  patience: 10             # early stopping patience (eval intervals)
  early_stopping: true     # set false to disable entirely
  min_steps_before_early_stop: 500000  # don't early-stop until ~4 epochs seen
  emergency_save_interval: 500  # rolling save for UPS/power-off safety (0 to disable)

data:
  src_lang: zh
  tgt_lang: en
  train_src: data/train.zh
  train_tgt: data/train.en
  valid_src: data/valid.zh
  valid_tgt: data/valid.en
  test_src: data/test.zh
  test_tgt: data/test.en
  spm_model: data/spm.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints
  keep_last: 5
