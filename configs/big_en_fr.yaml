# Transformer Big — WMT14 en-fr (v2: 30M corpus + v2-style step budget)
#
# Big v1 (10M pairs, 279K steps) tied Base v1 at test 34.66 — hit the same
# tokenizer/BLEU ceiling as Base rather than breaking through. Big v2 is
# the capacity test on Base v2's noisier 30M data: does 209M params absorb
# the noise that 60M couldn't? Target: match or exceed v1's 34.69 ceiling.
#
# v2 design vs Big v1:
#   - data: 30M pairs (v2 loose-filter) vs Big v1's 10M strict-filter subset
#   - max_steps 300K → 800K (3× to match 3× data, like Base v2 did)
#   - warmup_steps 8K → 24K (keep warmup/total ratio)
#   - dropout 0.2 → 0.1 (30M ≈ paper's 36M scale; match paper default)
#   - save/eval intervals scaled proportionally
#
# Carried-over lessons (still apply):
#   - bf16 (fp16 added a failure axis for Big, ruled out)
#   - lr_scale 1.5 (safe with long warmup)
#   - min_lr floor 1e-5 (prevent Noam → 0 in late training)
#   - spike guard ratio 1.3 / EMA α 0.005
#
# Runtime estimate: ~17-20h on single 5090 (Big v1 did 279K in ~6h).

model:
  d_model: 1024
  n_heads: 16
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 4096
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  # Big is memory-heavy. 5090 32GB with BF16 fits ~8K tokens / micro-batch.
  # 4x accumulation → effective ~32K tokens/step (half of Base's 100K).
  batch_size: 8192
  max_sentences: 64
  accumulate_steps: 4

  max_steps: 800000
  warmup_steps: 24000
  lr: 0.0007
  lr_scale: 1.5              # peak ~7e-4, safe with 8K warmup
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 15000
  # Adaptive eval — Big's eval is slow, so sparser than Base early on
  eval_interval: 40000
  eval_interval_min: 3000
  eval_loss_high: 4.0
  eval_loss_low: 2.8
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 360000
  emergency_save_interval: 500

  # Spike guard (from Big zh-en post-mortem)
  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: data/train.clean.en
  train_tgt: data/train.clean.fr
  valid_src: data/valid.en
  valid_tgt: data/valid.fr
  test_src: data/test.en
  test_tgt: data/test.fr
  spm_model: data/spm_enfr.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints/big_enfr
  keep_last: 5

logging:
  swanlab:
    enabled: true
    project: wmt-mt
    experiment: big_enfr_v2
    mode: cloud        # "cloud" uploads to swanlab.cn; use "local" to keep it offline
