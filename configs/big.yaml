# Transformer Big Configuration
# ~213M parameters. Restarted from scratch after repeated blowups on resumed runs
# from step_45000.pt — lessons learned are baked into this config.

model:
  d_model: 1024
  n_heads: 16
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 4096
  dropout: 0.3              # Big uses higher dropout to prevent overfitting
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  batch_size: 8192          # tokens per batch (Big is memory-heavy)
  max_sentences: 64
  accumulate_steps: 4       # effective batch = 32K

  # Schedule: 400K total, 8K warmup. 4K warmup was too short for Big — early
  # gradient magnitudes caused weight trajectories that destabilized later.
  max_steps: 400000
  warmup_steps: 8000
  lr: 0.0007
  lr_scale: 1.5             # peak LR ~7e-4 (safe with 8K warmup)
  min_lr: 1.0e-5            # floor — prevents LR decaying to ~0 in late training

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  # Precision: bf16 only. fp16 blowups were the first hypothesis but the real
  # instability was data-driven; bf16 still helps by removing one failure axis.
  fp16: false
  bf16: true

  seed: 43

  save_interval: 5000
  eval_interval: 10000      # dense eval on fresh run — early trend detection
  eval_interval_min: 2000
  eval_loss_high: 4.0
  eval_loss_low: 3.0
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 100000
  emergency_save_interval: 500

  # Loss-spike guard (tightened from the failed run)
  # Previous 1.8 threshold missed the actual failure mode: staircase drift
  # of ~6-10% per step that compounds into full blowup over ~100 steps.
  # 1.3 catches gradual drift; EMA alpha 0.005 (window ~200 steps) prevents
  # the EMA from being dragged up along with the drift.
  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: zh
  tgt_lang: en
  train_src: data/train.clean.zh
  train_tgt: data/train.clean.en
  valid_src: data/valid.zh
  valid_tgt: data/valid.en
  test_src: data/test.zh
  test_tgt: data/test.en
  spm_model: data/spm.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints_big
  keep_last: 5
