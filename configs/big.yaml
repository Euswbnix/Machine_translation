# Transformer Big Configuration
# ~213M parameters, higher BLEU ceiling but ~2-3x slower training

model:
  d_model: 1024
  n_heads: 16
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 4096
  dropout: 0.3              # Big uses higher dropout to prevent overfitting
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  batch_size: 8192          # tokens per batch (Big is memory-heavy)
  max_sentences: 64
  accumulate_steps: 4       # effective batch = 32K
  max_steps: 600000
  warmup_steps: 4000
  lr: 0.0007
  lr_scale: 1.2             # 1.0 was too conservative — combined with clip it stalled learning
  min_lr: 0.0
  label_smoothing: 0.1
  clip_grad_norm: 1.0       # back to 1.0 — spike guard now handles the toxic-batch defense directly
  fp16: false
  bf16: true                # bf16 alone didn't fix blowups — they were data-driven, not overflow
  seed: 43                  # was 42; changes shuffle order to escape the deterministic bad-batch trajectory
  save_interval: 5000
  eval_interval: 50000
  eval_interval_min: 2000
  eval_loss_high: 4.0
  eval_loss_low: 3.0
  log_interval: 100
  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 400000  # don't early-stop before this global_step (avoids stopping during mode-collapse phase)
  emergency_save_interval: 500  # rolling save for UPS/power-off safety (0 to disable)

data:
  src_lang: zh
  tgt_lang: en
  train_src: data/train.clean.zh
  train_tgt: data/train.clean.en
  valid_src: data/valid.zh
  valid_tgt: data/valid.en
  test_src: data/test.zh
  test_tgt: data/test.en
  spm_model: data/spm.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints_big      # separate checkpoint dir
  keep_last: 5
