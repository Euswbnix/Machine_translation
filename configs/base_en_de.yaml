# Transformer Base — WMT14 en-de
#
# The most-cited MT benchmark — Vaswani et al. report Base 27.3 tokenized BLEU
# (~25-26 sacrebleu). This config targets that number on a single 5090.
#
# Data scale is very different from en-fr:
#   WMT14 de-en raw: ~4.5M pairs (vs en-fr's 40M)
#   after v1-style strict cleaning: expect 3-4M pairs
#   so epochs-per-step is ~3× denser than en-fr v1
#
# Step budget follows the paper (100K @ 25K tok/batch ≈ 4-6 epochs on ~4M
# pairs). Warmup matches v1 en-fr's ratio.
#
# Runtime estimate: 2-3h on 5090 (similar to Base v1 en-fr).

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  batch_size: 24576
  max_sentences: 192
  accumulate_steps: 4

  max_steps: 100000
  warmup_steps: 4000
  lr: 0.0007
  lr_scale: 1.0
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 5000
  eval_interval: 10000
  eval_interval_min: 2000
  eval_loss_high: 4.0
  eval_loss_low: 2.8
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 40000
  emergency_save_interval: 500

  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: de
  train_src: data_ende/train.clean.en
  train_tgt: data_ende/train.clean.de
  valid_src: data_ende/valid.en
  valid_tgt: data_ende/valid.de
  test_src: data_ende/test.en
  test_tgt: data_ende/test.de
  spm_model: data_ende/spm_ende.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints/base_ende
  keep_last: 5

logging:
  swanlab:
    enabled: true
    project: wmt-mt
    experiment: base_ende
    mode: cloud
