# Transformer Base — WMT14 en-fr (v2: three improvements stacked)
#
# v1 (100K steps, 10M pairs, SPM coverage 0.9995) got BLEU 30.00 valid /
# 34.69 test-averaged (sacrebleu 13a). v2 stacks:
#   1. SPM character_coverage=1.0  → no <unk> on Israël / Noël / maïs etc.
#                                    expected gain: +0.3 to +0.8 BLEU
#   2. Full WMT14 corpus (~36M pairs vs 10M subset)
#                                    expected gain: +1 to +2 BLEU
#   3. 2x training budget (200K steps) to actually use the larger corpus
#                                    effective batch kept at Base's original
#                                    100K tokens/step (it was fine, the batch
#                                    bottleneck was specific to Big)
# Combined target: test BLEU ~36.7 (sacrebleu), close to paper Base 38.1
# (tokenized) which equals ~35-36 sacrebleu.
#
# PREREQ before using this config:
#   # 1. Download full corpus (no --max-train-samples cap)
#   python scripts/download_wmt_enfr.py
#   # 2. Clean
#   python scripts/clean_data_enfr.py
#   # 3. Retrain SPM at 1.0 coverage (overwrites spm_enfr.model)
#   python scripts/train_tokenizer.py \
#       --inputs data/train.clean.en data/train.clean.fr \
#       --model-prefix data/spm_enfr \
#       --vocab-size 32000 \
#       --character-coverage 1.0

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  # Effective batch ~100K tokens (unchanged from v1 — it was already good)
  batch_size: 24576
  max_sentences: 192
  accumulate_steps: 4

  # v1 ran 100K and converged on 10M data. 36M is 3.6x more data, so bump
  # budget to 200K steps so the model actually sees each pair enough times.
  max_steps: 200000
  warmup_steps: 4000
  lr: 0.0007
  lr_scale: 1.0
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 10000
  # Adaptive eval — sparse early, dense once loss crosses the band
  eval_interval: 30000
  eval_interval_min: 3000
  eval_loss_high: 4.0
  eval_loss_low: 2.8
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 80000
  emergency_save_interval: 500

  # Spike guard (battle-tested on both en-fr and Big zh-en)
  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: data/train.clean.en
  train_tgt: data/train.clean.fr
  valid_src: data/valid.en
  valid_tgt: data/valid.fr
  test_src: data/test.en
  test_tgt: data/test.fr
  spm_model: data/spm_enfr.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints/base_enfr
  keep_last: 5
