# Transformer Base — WMT14 en-fr (v3: proper step budget for 30M corpus)
#
# v2 (200K steps, 30M pairs, SPM coverage 1.0) capped at valid 27.77 — under
# v1's 28 ceiling. Post-mortem: 200K steps on 30M pairs = ~1.3 epochs, vs
# v1's ~4 epochs on 9.3M. LR schedule decayed before the model finished
# learning. Fix: scale step budget to restore ~4 epochs of exposure.
#
# v3 changes from v2:
#   - max_steps:    200000 → 600000   (3× to match 3× data)
#   - warmup_steps: 4000   → 12000    (keep warmup/total ratio)
#   - save_interval:10000  → 15000    (avoid ckpt spam)
#   - min_steps_before_early_stop: 80000 → 240000 (proportional)
#   - eval_interval kept at 30000 — we want dense signal across the longer run
# SPM, data, architecture unchanged from v2.
#
# Runtime estimate: ~48h on 5090 at ~100K tok/s.
# Target: break 28 valid BLEU, land 29-30 post-averaging.

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  # Effective batch ~100K tokens (unchanged from v1 — it was already good)
  batch_size: 24576
  max_sentences: 192
  accumulate_steps: 4

  max_steps: 600000
  warmup_steps: 12000
  lr: 0.0007
  lr_scale: 1.0
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 15000
  # Adaptive eval — sparse early, dense once loss crosses the band
  eval_interval: 30000
  eval_interval_min: 3000
  eval_loss_high: 4.0
  eval_loss_low: 2.8
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 240000
  emergency_save_interval: 500

  # Spike guard (battle-tested on both en-fr and Big zh-en)
  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: data/train.clean.en
  train_tgt: data/train.clean.fr
  valid_src: data/valid.en
  valid_tgt: data/valid.fr
  test_src: data/test.en
  test_tgt: data/test.fr
  spm_model: data/spm_enfr.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints/base_enfr
  keep_last: 5
