# Transformer Base — en-fr
# Pivot from WMT17 zh-en (failed, see README). en-fr is the standard sanity
# check: both sides share Latin script so shared BPE is clean, and published
# Transformer Base numbers on WMT14 en-fr are ~27 BLEU — a concrete target.
#
# Tuning vs the zh-en base.yaml:
#   - dropout 0.1 (paper default; en-fr has plenty of data, no overfit risk)
#   - bf16 (kept from the Big lessons — removes one failure axis)
#   - spike guard kept tight (1.3 / alpha 0.005) as cheap insurance
#   - max_steps 100K for a first pass; extend if loss still dropping

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000          # shared BPE — works well here, both sides Latin
  share_embeddings: true

training:
  batch_size: 24576          # tokens per batch (5090 32GB)
  max_sentences: 192
  accumulate_steps: 4        # effective batch ~100K tokens

  max_steps: 100000          # paper reports Base converges by ~100K updates on en-fr
  warmup_steps: 4000
  lr: 0.0007
  lr_scale: 1.0              # paper default
  min_lr: 1.0e-5             # floor; Noam → ~0 is unhelpful late

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  # Precision: bf16. fp16 survived Base zh-en fine, but bf16 is strictly safer
  # and costs nothing on Ada/Hopper.
  fp16: false
  bf16: true

  seed: 42

  save_interval: 5000
  # Adaptive eval — sparse early, dense once loss drops
  eval_interval: 20000
  eval_interval_min: 2000
  eval_loss_high: 4.0
  eval_loss_low: 3.0
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 40000
  emergency_save_interval: 500

  # Spike guard — kept tight based on Big zh-en staircase-drift failures
  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: data/train.clean.en
  train_tgt: data/train.clean.fr
  valid_src: data/valid.en
  valid_tgt: data/valid.fr
  test_src: data/test.en
  test_tgt: data/test.fr
  spm_model: data/spm_enfr.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints_enfr
  keep_last: 5
