# Transformer Base — WMT14 en-fr (v2: full corpus + proper step budget)
#
# v1 (100K steps, 9.3M pairs, SPM coverage 0.9995) hit valid 30.00 / test 34.69
# averaged. v2 targets that ceiling via the full corpus, SPM coverage fix, and
# a step budget matched to the larger data.
#
# v2 design rationale:
#   - max_steps 600000    (3× v1's 100K, matching 3× data growth to ~4 epochs)
#   - warmup_steps 12000  (3× v1's 4000, keep warmup/total ratio)
#   - save_interval 15000 / min_steps_before_early_stop 240000 (proportional)
#   - eval_interval kept at 30000 for dense signal across the longer run
#   - data: 30M pairs from loose-filter WMT14, SPM coverage 1.0
#
# First v2 attempt used 200K steps and underfit at 27.77 (1.3 epochs on 30M
# is not enough exposure); that run is shelved. Current config reflects the
# corrected 600K budget that converged at 29.06 best / 29.23 averaged.
#
# Runtime: ~13h on 5090 at ~100K tok/s.
# Outcome: valid 29.23 / test 33.90 averaged — below v1's 34.69 despite more
# data + more steps. See README "Ablation Case: Base v2" for the analysis.

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  # Effective batch ~100K tokens (unchanged from v1 — it was already good)
  batch_size: 24576
  max_sentences: 192
  accumulate_steps: 4

  max_steps: 600000
  warmup_steps: 12000
  lr: 0.0007
  lr_scale: 1.0
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 15000
  # Adaptive eval — sparse early, dense once loss crosses the band
  eval_interval: 30000
  eval_interval_min: 3000
  eval_loss_high: 4.0
  eval_loss_low: 2.8
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 240000
  emergency_save_interval: 500

  # Spike guard (battle-tested on both en-fr and Big zh-en)
  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: data/train.clean.en
  train_tgt: data/train.clean.fr
  valid_src: data/valid.en
  valid_tgt: data/valid.fr
  test_src: data/test.en
  test_tgt: data/test.fr
  spm_model: data/spm_enfr.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints/base_enfr
  keep_last: 5
