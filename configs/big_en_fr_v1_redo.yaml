# Transformer Big — WMT14 en-fr v1.1 REDO (tokenizer-fix rerun)
#
# Purpose: mirror Base v1.1's redo at Big capacity. Same 9.3M strict-
# filter data, same coverage=1.0 SPM, but 209M params + longer schedule.
# Original Big v1 (0.9995 coverage, 279K steps) hit averaged test 34.66,
# tying then-Base's 34.69. New Base v1.1 is 35.31 — does Big v1.1 cross
# it or stay tied?
#
# Design:
#   - d_model 1024, 16 heads, d_ff 4096, dropout 0.1 (paper Big en-fr)
#   - 280K steps / 8K warmup (match original Big v1 schedule)
#   - batch 8192 × accumulate 4 = 32K tok/step (Big memory ceiling on 5090)
#   - SPM: data_enfr_v1/spm_enfr_v1_fixed.model (coverage 1.0)
#
# Runtime estimate: ~6h on 5090 (matches original Big v1).
# Decision rule: if averaged test > 35.5, Big finally beats Base. If
# 34.6-35.5 range, Big still doesn't pay on 9.3M → confirms "capacity
# second" lesson from v2. Either outcome is reportable.

model:
  d_model: 1024
  n_heads: 16
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 4096
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  batch_size: 8192
  max_sentences: 64
  accumulate_steps: 4

  max_steps: 280000
  warmup_steps: 8000
  lr: 0.0007
  lr_scale: 1.5
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 10000
  eval_interval: 20000
  eval_interval_min: 3000
  eval_loss_high: 4.0
  eval_loss_low: 2.8
  log_interval: 100

  patience: 10
  early_stopping: true
  min_steps_before_early_stop: 120000
  emergency_save_interval: 500

  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: data_enfr_v1/train.clean.en
  train_tgt: data_enfr_v1/train.clean.fr
  valid_src: data_enfr_v1/valid.en
  valid_tgt: data_enfr_v1/valid.fr
  test_src: data_enfr_v1/test.en
  test_tgt: data_enfr_v1/test.fr
  spm_model: data_enfr_v1/spm_enfr_v1_fixed.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: checkpoints/big_enfr_v1_redo
  keep_last: 5

logging:
  swanlab:
    enabled: true
    project: wmt-mt
    experiment: big_enfr_v1_redo
    mode: cloud
